map $request_method $api_mutate_key {
    default $binary_remote_addr;
    GET "";
    HEAD "";
    OPTIONS "";
}

limit_req_zone $binary_remote_addr zone=api_read:10m rate=30r/m;
limit_req_zone $api_mutate_key zone=api_mutate:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

server {
    listen 8080;
    listen 80;      # Also bind port 80 for Cloudflare tunnel (requires NET_BIND_SERVICE cap)
    server_name localhost;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://sharks_api:5000;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 128k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 15s;
    ignore_invalid_headers on;

    # Gzip compression — critical for Pi bandwidth (317KB JS → ~91KB on wire)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Remove server version fingerprint
    server_tokens off;

    # Security headers (applied to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://i.scdn.co; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.modal.run https://api.spotify.com https://accounts.spotify.com; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    limit_conn perip 40;

    # Block hidden/sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(env|log|bak|old|sql|ini|yml|yaml|conf)$ {
        deny all;
    }

    # Robots: allow public pages, block API
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\n";
    }

    # index.html — no cache so users always get the latest build.
    # NOTE: must repeat security headers — nginx location add_header does NOT inherit server-level headers.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://i.scdn.co; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.modal.run https://api.spotify.com https://accounts.spotify.com; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    }

    # PWA service worker and manifest — must not be cached.
    # NOTE: repeats security headers for same nginx inheritance reason.
    location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://i.scdn.co; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.modal.run https://api.spotify.com https://accounts.spotify.com; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    }

    # Minimal sitemap for crawler coverage
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        return 200 '<?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"><url><loc>https://dugout.joelycannoli.com/</loc><changefreq>daily</changefreq><priority>1.0</priority></url><url><loc>https://dugout.joelycannoli.com/about/</loc><changefreq>monthly</changefreq><priority>0.5</priority></url><url><loc>https://dugout.joelycannoli.com/contact/</loc><changefreq>monthly</changefreq><priority>0.3</priority></url><url><loc>https://dugout.joelycannoli.com/privacy/</loc><changefreq>monthly</changefreq><priority>0.3</priority></url></urlset>';
    }

    # Return 404 for all other sitemap probe paths (common crawler probes that
    # would otherwise fall through to the SPA and return HTML, not valid XML).
    # Covers /sitemap_index.xml, /post-sitemap.xml, /news-sitemap.xml, etc.
    location ~* sitemap.*\.xml$ {
        return 404;
    }

    # Static info pages — serve directly for both /page and /page/ with no redirect.
    # Without this, try_files would issue a 301 /page → /page/ (HTTP), then Cloudflare
    # would redirect HTTP→HTTPS, creating a 3-hop chain that crawlers penalise.
    location ~ ^/(about|contact|privacy)/?$ {
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
        try_files /$1/index.html =404;
    }

    # SPA fallback — handle Cloudflare challenge POST-back to /
    location / {
        if ($request_method = POST) {
            return 204;
        }
        try_files $uri $uri/ /index.html;
    }

    # Cache-busted static assets (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Public data artifacts
    location /data/ {
        alias /srv/data/;
        expires 10s;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Announcer audio clips (rendered TTS, cache-busted by timestamp in filename)
    location /announcer-clips/ {
        alias /srv/data/sharks/announcer/clips/;
        limit_req zone=api_read burst=10 nodelay;
        limit_req_status 429;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        types { audio/mpeg mp3; }
    }

    # Availability supports GET (read) and POST (write).
    location = /api/availability {
        limit_except GET POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=4 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Practice insights supports GET (read) and POST (write).
    location = /api/practice-insights {
        limit_except GET POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=4 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Announcer game-state (GET + POST).
    location = /api/announcer/game-state {
        limit_except GET POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=10 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Announcer render worker: Mac polls queue + claims jobs.
    location ~ ^/api/announcer/(render-queue|heartbeat) {
        limit_except GET POST PATCH OPTIONS { deny all; }
        limit_req zone=api_mutate burst=10 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # Announcer render-complete: Mac uploads FLAC + MP3 (large body — internal use only).
    # Note: the Mac should POST directly to Pi:5000 via Tailscale, bypassing nginx.
    # This location exists as a fallback only; client_max_body_size raised for this path.
    location ~ ^/api/announcer/render-complete/ {
        limit_except POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=4 nodelay;
        limit_req_status 429;
        client_max_body_size 50m;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
    }

    # Announcer SSE render-status stream (keep-alive, no buffering).
    location ~ ^/api/announcer/render-status/ {
        limit_except GET OPTIONS { deny all; }
        limit_req zone=api_read burst=5 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Accel-Buffering "no";
        proxy_buffering off;
        proxy_cache off;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
    }

    # Announcer worker status (PWA online/offline indicator).
    location = /api/announcer/worker-status {
        limit_except GET OPTIONS { deny all; }
        limit_req zone=api_read burst=10 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Announcer game-lineup — GC batting order for NowPlayingView (read-only).
    location = /api/announcer/game-lineup {
        limit_except GET OPTIONS { deny all; }
        limit_req zone=api_read burst=5 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Announcer song pool + next-songs pre-buffer (GET + POST + DELETE).
    location ~ ^/api/announcer/(songs|next-songs) {
        limit_except GET POST DELETE OPTIONS { deny all; }
        limit_req zone=api_mutate burst=10 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Music Wizard catalog search (read-only, fast).
    location = /api/announcer/catalog/search {
        limit_except GET OPTIONS { deny all; }
        limit_req zone=api_read burst=20 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Music Wizard roster suggestions + optimal-start + music-auth + licensing.
    location ~ ^/api/announcer/(music-wizard|optimal-start|music-auth|licensing-info) {
        limit_except GET POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=10 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # CSV import — multipart upload, allow larger body, longer timeout.
    location = /api/announcer/csv-import {
        limit_except POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=2 nodelay;
        limit_req_status 429;
        client_max_body_size 2m;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Announcer write endpoints (POST render, phonetics, add-sub).
    # Timeout extended to 120s — TTS render via Replicate can take up to 60s.
    location ~ ^/api/announcer/(render|render-all|phonetics|add-sub) {
        limit_except GET POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=4 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # Write-only endpoints.
    location ~ ^/api/(regenerate-lineups|borrowed-player)$ {
        limit_except POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=4 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Deploy webhook (POST with auth token)
    location = /api/deploy {
        limit_except POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=2 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Manual sync trigger — POST with DEPLOY_WEBHOOK_TOKEN bearer auth.
    location = /api/sync/kick {
        limit_except POST OPTIONS { deny all; }
        limit_req zone=api_mutate burst=2 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # Read endpoints
    location /api/ {
        limit_except GET HEAD OPTIONS { deny all; }
        limit_req zone=api_read burst=20 nodelay;
        limit_req_status 429;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_hide_header X-Powered-By;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Catch-all: return 444 for unknown paths to avoid probing
    location @closed {
        return 444;
    }
}
