server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Disable caching for index.html to ensure users always get the latest build
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # SPA fallback - route all requests to index.html
    # error_page 405 handles Cloudflare challenge POST-back to /
    location / {
        error_page 405 =200 /index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve live data from the sync daemon's volume mount
    location /data/ {
        alias /srv/data/;
        expires 10s;
        add_header Cache-Control "public, must-revalidate";
    }

    # Proxy API requests to the sync daemon (Flask)
    location /api/ {
        proxy_pass http://sharks_sync:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
