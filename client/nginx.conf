limit_req_zone $binary_remote_addr zone=api_read:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_mutate:10m rate=6r/m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Remove server version fingerprint
    server_tokens off;

    # Security headers (applied to all responses)
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "DENY"                             always;
    add_header Referrer-Policy         "no-referrer"                      always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # index.html — no cache so users always get the latest build
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # SPA fallback — handle Cloudflare challenge POST-back to /
    location / {
        if ($request_method = POST) {
            return 200;
        }
        try_files $uri $uri/ /index.html;
    }

    # Cache-busted static assets (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Live data served directly from sync daemon volume mount
    location /data/ {
        alias /srv/data/;
        expires 10s;
        add_header Cache-Control "public, must-revalidate";
    }

    # Mutating API endpoints — tight rate limit
    location ~ ^/api/(availability|regenerate-lineups|borrowed-player) {
        limit_req zone=api_mutate burst=4 nodelay;
        limit_req_status 429;
        proxy_pass         http://sharks_sync:5000$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # Read-only API endpoints — generous rate limit
    location /api/ {
        limit_req zone=api_read burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://sharks_sync:5000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
