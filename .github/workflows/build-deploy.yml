name: Build & Deploy Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: anchorgroupops

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sharks-dashboard:latest
            ghcr.io/${{ env.OWNER }}/sharks-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.scraper
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sharks-api:latest
            ghcr.io/${{ env.OWNER }}/sharks-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
