name: Build & Deploy Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: anchorgroupops

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./client
          file: ./client/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sharks-dashboard:latest
            ghcr.io/${{ env.OWNER }}/sharks-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile.scraper
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sharks-api:latest
            ghcr.io/${{ env.OWNER }}/sharks-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-deploy:
    runs-on: ubuntu-latest
    needs: [build-dashboard, build-api]
    if: success()
    steps:
      - name: Trigger deploy webhook
        continue-on-error: true
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://dugout.joelycannoli.com/api/deploy \
            --max-time 10 || echo "Deploy webhook skipped (not configured or unreachable)"
