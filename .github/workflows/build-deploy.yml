name: Build & Deploy Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: anchorgroupops

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./client
          file: ./client/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sharks-dashboard:latest
            ghcr.io/${{ env.OWNER }}/sharks-dashboard:${{ github.sha }}
          build-args: |
            VITE_SPOTIFY_CLIENT_ID=0f24c048c5af4e8aaf82da48482ec1fd
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.scraper
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/sharks-api:latest
            ghcr.io/${{ env.OWNER }}/sharks-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-deploy:
    runs-on: ubuntu-latest
    needs: [build-dashboard, build-api]
    if: success()
    steps:
      - name: Trigger deploy webhook (best-effort)
        continue-on-error: true
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://dugout.joelycannoli.com/api/deploy \
            --max-time 15
        # Best-effort because Cloudflare bot-fight rejects the GH Actions curl before
        # it reaches the Pi. Watchtower (WATCHTOWER_POLL_INTERVAL=300) picks up the
        # new image within 5 min regardless, and verify-deploy below is the real gate.

  verify-deploy:
    runs-on: ubuntu-latest
    needs: [notify-deploy]
    if: success()
    steps:
      - name: Health check dugout.joelycannoli.com
        # Budget covers: GHCR propagation (~seconds), Watchtower poll (60s),
        # image pull on Pi (~1 min), rolling restart (brief 502 window).
        # 60s initial + 36 * 30s = 19 min ceiling. Generous buffer avoids
        # spurious CI failure emails from tight-timing edge cases.
        run: |
          sleep 60
          for i in $(seq 1 36); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://dugout.joelycannoli.com/api/health --max-time 15 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 30
          done
          echo "Health check failed after 36 attempts (~18 min)."
          exit 1
