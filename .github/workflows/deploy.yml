name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://sharks.joelycannoli.com/api/deploy)

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/deploy_response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Deploy webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Deploy triggered successfully"
