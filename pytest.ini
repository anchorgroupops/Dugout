[pytest]
testpaths = tests
addopts =
    --strict-markers
    --tb=short
    -ra
filterwarnings =
    ignore::DeprecationWarning:pdfplumber.*
    ignore::DeprecationWarning:pypdf.*
    ignore::UserWarning:matplotlib.*
markers =
    slow: tests that hit the network or take > 1s
    property: hypothesis property-based tests
