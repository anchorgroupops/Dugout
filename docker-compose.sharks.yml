version: "3.8"

# Sharks Softball Dashboard
# Safe deployment for Raspberry Pi (Isolated from n8n on port 5678)
# ⚠️  This compose file is COMPLETELY SEPARATE from the n8n stack.
# It uses its own network and only exposes port 3000.

services:
  sharks_dashboard:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sharks_dashboard
    restart: unless-stopped
    depends_on:
      - sharks_api
    volumes:
      - ./data:/srv/data:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Port 3000 ONLY. n8n is on 5678, Postgres on 5432.
      # Map Cloudflare Zero Trust: sharks.joelycannoli.com -> http://192.168.7.222:3000
      - "3000:80"
    networks:
      - sharks_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3

  sharks_sync:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: sharks_sync
    restart: unless-stopped
    environment:
      - RUN_API_SERVER=0
      - CORS_ORIGINS=https://sharks.joelycannoli.com,http://localhost:3000,http://localhost:5173
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./tools:/app/tools:ro
      - ./Scorebooks:/app/Scorebooks:ro
    networks:
      - sharks_net

  sharks_api:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: sharks_api
    restart: unless-stopped
    command:
      - gunicorn
      - --chdir
      - /app/tools
      - --bind
      - 0.0.0.0:5000
      - --workers
      - "2"
      - --threads
      - "4"
      - --timeout
      - "90"
      - sync_daemon:app
    environment:
      - CORS_ORIGINS=https://sharks.joelycannoli.com,http://localhost:3000,http://localhost:5173
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./tools:/app/tools:ro
      - ./Scorebooks:/app/Scorebooks:ro
    networks:
      - sharks_net


networks:
  sharks_net:
    driver: bridge
    name: sharks_net
