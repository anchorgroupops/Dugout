version: "3.8"

# Sharks Softball Dashboard
# Supports two deploy modes:
#   1. GHCR + Watchtower (auto): images pulled from ghcr.io, Watchtower auto-updates
#   2. Local build (manual): docker compose build && docker compose up -d

services:
  sharks_dashboard:
    image: ghcr.io/anchorgroupops/sharks-dashboard:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sharks_dashboard
    restart: unless-stopped
    depends_on:
      sharks_api:
        condition: service_healthy
    volumes:
      - ./data:/srv/data:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    read_only: true
    init: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    networks:
      - sharks_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  sharks_sync:
    image: ghcr.io/anchorgroupops/sharks-api:latest
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: sharks_sync
    restart: unless-stopped
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - RUN_API_SERVER=0
      - CORS_ORIGINS=https://sharks.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - WRITE_ORIGINS=https://sharks.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - ALLOWED_HOSTS=sharks.joelycannoli.com,localhost,127.0.0.1,sharks_api,sharks_dashboard
      - MAX_JSON_BODY_BYTES=131072
      - MUTATE_RATE_WINDOW_SEC=60
      - MUTATE_RATE_MAX=12
      - GC_ORG_IDS=7ZUyPJwky5DG
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./Scorebooks:/app/Scorebooks:ro
    networks:
      - sharks_net
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    init: true
    healthcheck:
      # Check data dir exists AND log file has been written (proves daemon started)
      test: ["CMD", "sh", "-c", "test -d /app/data && test -d /app/logs"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  sharks_api:
    image: ghcr.io/anchorgroupops/sharks-api:latest
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: sharks_api
    restart: unless-stopped
    command:
      - gunicorn
      - --chdir
      - /app/tools
      - --bind
      - 0.0.0.0:5000
      - --workers
      - "2"
      - --threads
      - "4"
      - --timeout
      - "90"
      - --graceful-timeout
      - "30"
      - --keep-alive
      - "5"
      - --worker-tmp-dir
      - /dev/shm
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "100"
      - --limit-request-line
      - "4094"
      - --limit-request-fields
      - "40"
      - --limit-request-field_size
      - "8190"
      - sync_daemon:app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=https://sharks.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - WRITE_ORIGINS=https://sharks.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - ALLOWED_HOSTS=sharks.joelycannoli.com,localhost,127.0.0.1,sharks_api,sharks_dashboard
      - MAX_JSON_BODY_BYTES=131072
      - MUTATE_RATE_WINDOW_SEC=60
      - MUTATE_RATE_MAX=12
      - GC_ORG_IDS=7ZUyPJwky5DG
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - DEPLOY_WEBHOOK_TOKEN=${DEPLOY_WEBHOOK_TOKEN}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./Scorebooks:/app/Scorebooks:ro
    networks:
      - sharks_net
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    init: true
    healthcheck:
      # /api/health is purpose-built: lightweight, never 404s, returns stale-source data
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 12s
      retries: 4
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_ROLLING_RESTART=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    networks:
      - sharks_net

networks:
  sharks_net:
    driver: bridge
    name: sharks_net
