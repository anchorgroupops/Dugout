# Sharks Softball Dashboard — Dugout
# Deploy: dugout.joelycannoli.com
# Modes:
#   1. GHCR + Watchtower (auto): images pulled from ghcr.io, Watchtower auto-updates
#   2. Local build (manual): docker compose build && docker compose up -d

services:
  sharks_dashboard:
    image: ghcr.io/anchorgroupops/sharks-dashboard:latest
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_SPOTIFY_CLIENT_ID: ${VITE_SPOTIFY_CLIENT_ID:-}
    container_name: sharks_dashboard
    restart: unless-stopped
    depends_on:
      sharks_api:
        condition: service_healthy
    volumes:
      - ./data:/srv/data:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:3000:8080"
    read_only: true
    init: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 256
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 1.0
    networks:
      - sharks_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sharks_sync:
    image: ghcr.io/anchorgroupops/sharks-api:latest
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: sharks_sync
    restart: unless-stopped
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONHASHSEED=random
      - RUN_API_SERVER=0
      - GC_PLAYWRIGHT_CONTEXT_DIR=/app/data/.playwright_context
      - CORS_ORIGINS=https://sharks.joelycannoli.com,https://dugout.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - WRITE_ORIGINS=https://sharks.joelycannoli.com,https://dugout.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - ALLOWED_HOSTS=sharks.joelycannoli.com,dugout.joelycannoli.com,localhost,127.0.0.1,sharks_api,sharks_dashboard
      - MAX_JSON_BODY_BYTES=131072
      - MUTATE_RATE_WINDOW_SEC=60
      - MUTATE_RATE_MAX=12
      - GC_ORG_IDS=${GC_ORG_IDS}
      - GC_TEAM_ID=${GC_TEAM_ID}
      - GC_SEASON_SLUG=${GC_SEASON_SLUG}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./Scorebooks:/app/Scorebooks:ro
    networks:
      - sharks_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 2.0
    init: true
    healthcheck:
      test: ["CMD", "sh", "-c", "test -d /app/data && test -d /app/logs"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  sharks_api:
    image: ghcr.io/anchorgroupops/sharks-api:latest
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: sharks_api
    restart: unless-stopped
    command:
      - gunicorn
      - --chdir
      - /app/tools
      - --bind
      - 0.0.0.0:5000
      - --workers
      - "2"
      - --threads
      - "4"
      - --timeout
      - "90"
      - --graceful-timeout
      - "30"
      - --keep-alive
      - "5"
      - --worker-tmp-dir
      - /dev/shm
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "100"
      - --limit-request-line
      - "4094"
      - --limit-request-fields
      - "40"
      - --limit-request-field_size
      - "8190"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
      - sync_daemon:app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONHASHSEED=random
      - CORS_ORIGINS=https://sharks.joelycannoli.com,https://dugout.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - WRITE_ORIGINS=https://sharks.joelycannoli.com,https://dugout.joelycannoli.com,http://localhost:3000,http://localhost:5173
      - ALLOWED_HOSTS=sharks.joelycannoli.com,dugout.joelycannoli.com,localhost,127.0.0.1,sharks_api,sharks_dashboard
      - MAX_JSON_BODY_BYTES=131072
      - MUTATE_RATE_WINDOW_SEC=60
      - MUTATE_RATE_MAX=12
      - GC_ORG_IDS=${GC_ORG_IDS}
      - GC_TEAM_ID=${GC_TEAM_ID}
      - GC_SEASON_SLUG=${GC_SEASON_SLUG}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - ANNOUNCER_VOICE_REF_URL=${ANNOUNCER_VOICE_REF_URL}
      - ANNOUNCER_VOICE_REF_TEXT=${ANNOUNCER_VOICE_REF_TEXT}
      - LOCAL_TTS_URL=${LOCAL_TTS_URL}
      - DEPLOY_WEBHOOK_TOKEN=${DEPLOY_WEBHOOK_TOKEN}
      - DEPLOY_SSH_KEY_B64=${DEPLOY_SSH_KEY_B64}
    extra_hosts:
      - "pi-host:host-gateway"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./Scorebooks:/app/Scorebooks:ro
    networks:
      - sharks_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    # 512m was too tight: 2 gunicorn workers × 4 threads, each loading the
    # ~5k-line sync_daemon module + Flask + requests + sqlite3 + stats
    # helpers routinely runs ~400-500 MB resident, and the container was
    # OOM-killing in a restart loop.  1g gives headroom.
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 2.0
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=8); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 12s
      retries: 4
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - WATCHTOWER_CLEANUP=true
      # Poll every 60s so new GHCR images are picked up within a minute,
      # well inside the GHA verify-deploy budget.
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_ROLLING_RESTART=true
      - DOCKER_API_VERSION=1.43
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOME}/.docker/config.json:/config.json:ro
    networks:
      - sharks_net
    mem_limit: 128m
    memswap_limit: 128m
    cpus: 0.5
    pids_limit: 128
    init: true
    healthcheck:
      test: ["NONE"]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  sharks_net:
    driver: bridge
    name: sharks_net
